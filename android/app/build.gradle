apply plugin: 'com.android.application'

android {
    namespace = "com.dosyapp.dosy"
    compileSdk = rootProject.ext.compileSdkVersion
    defaultConfig {
        applicationId "com.dosyapp.dosy"
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        versionCode 54
        versionName "0.2.1.5"
        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
        aaptOptions {
             // Files and dirs to omit from the packaged assets dir, modified to accommodate modern web apps.
             // Default: https://android.googlesource.com/platform/frameworks/base/+/282e181b58cf72b6ca770dc7ca5f91f135444502/tools/aapt/AaptAssets.cpp#61
            ignoreAssetsPattern = '!.svn:!.git:!.ds_store:!*.scc:.*:!CVS:!thumbs.db:!picasa.ini:!*~'
        }
    }

    // Release signing config — credentials lidas de keystore.properties OU env vars.
    // keystore.properties (PREFERIDO, gitignored) na raiz do projeto Android:
    //   storeFile=../dosy-release.keystore
    //   storePassword=...
    //   keyAlias=dosykey
    //   keyPassword=...
    // Fallback: env vars KEYSTORE_PATH, KEYSTORE_PASSWORD, KEY_ALIAS, KEY_PASSWORD.
    // Gerar keystore via:
    //   keytool -genkey -v -keystore dosy-release.keystore -alias dosykey -keyalg RSA -keysize 2048 -validity 10000
    // NUNCA commitar .keystore nem keystore.properties.
    def keystorePropsFile = rootProject.file('keystore.properties')
    def keystoreProps = new Properties()
    if (keystorePropsFile.exists()) {
        keystorePropsFile.withInputStream { keystoreProps.load(it) }
        println "[signing] keystore.properties LOADED: " + keystorePropsFile.absolutePath
        println "[signing] props keys: " + keystoreProps.keySet()
        println "[signing] storeFile=" + keystoreProps.getProperty('storeFile')
        println "[signing] storePassword set: " + (keystoreProps.getProperty('storePassword')?.length() > 0)
    } else {
        println "[signing] keystore.properties NOT FOUND at: " + keystorePropsFile.absolutePath
    }

    // Resolve keystore path: relative paths são tratadas relativas a rootProject (android/)
    // pra match o que keystore.properties define. Default: ../dosy-release.keystore
    // resolve para medcontrol_v2/dosy-release.keystore.
    def resolveKeystoreFile = { String path ->
        if (path == null) return null
        def f = new File(path)
        return f.absolute ? f : new File(rootProject.projectDir, path)
    }
    def keystorePathStr = keystoreProps.getProperty('storeFile') ?: System.getenv('KEYSTORE_PATH') ?: '../dosy-release.keystore'
    def keystoreFile = resolveKeystoreFile(keystorePathStr)
    println "[signing] resolved keystore path: ${keystoreFile?.absolutePath} (exists=${keystoreFile?.exists()})"

    signingConfigs {
        release {
            if (keystoreFile != null && keystoreFile.exists()) {
                storeFile keystoreFile
                storePassword keystoreProps.getProperty('storePassword') ?: System.getenv('KEYSTORE_PASSWORD') ?: ''
                keyAlias keystoreProps.getProperty('keyAlias') ?: System.getenv('KEY_ALIAS') ?: 'dosykey'
                keyPassword keystoreProps.getProperty('keyPassword') ?: System.getenv('KEY_PASSWORD') ?: ''
            }
        }
    }

    buildTypes {
        // Item #082 (release v0.1.7.1) — dual-app dev/prod:
        //   debug   → applicationId com.dosyapp.dosy.dev, label "Dosy Dev"
        //   release → applicationId com.dosyapp.dosy,     label "Dosy"
        // Coexistem no device. google-services.json em src/debug e raiz cobrem ambos.
        debug {
            applicationIdSuffix ".dev"
            versionNameSuffix "-dev"
            resValue "string", "app_name_override", "Dosy Dev"
            manifestPlaceholders = [appLabel: "@string/app_name_override"]
        }
        release {
            // Auditoria 4.5.4 G1 (P0): minifyEnabled true ativa ProGuard/R8.
            // Reduz APK size + obfusca código (anti reverse-engineering).
            // Keep rules custom em proguard-rules.pro (Capacitor + Sentry + Supabase).
            minifyEnabled true
            shrinkResources true
            proguardFiles getDefaultProguardFile('proguard-android.txt'), 'proguard-rules.pro'
            resValue "string", "app_name_override", "Dosy"
            manifestPlaceholders = [appLabel: "@string/app_name_override"]
            // Item #074 (release v0.2.0.2): habilita upload de debug symbols nativos.
            // Resolve aviso recorrente Play Console "App Bundle contém código nativo,
            // e você não fez upload dos símbolos de depuração". Melhora stack traces
            // de crashes/ANRs (Sentry DOSY-3 native ART crashes precisam disso).
            ndk {
                debugSymbolLevel 'FULL'
            }
            // Apply signing config only if keystore exists (avoid breaking debug builds)
            if (keystoreFile != null && keystoreFile.exists()) {
                signingConfig signingConfigs.release
            }
        }
    }
}

repositories {
    flatDir{
        dirs '../capacitor-cordova-android-plugins/src/main/libs', 'libs'
    }
}

dependencies {
    implementation fileTree(include: ['*.jar'], dir: 'libs')
    implementation "androidx.appcompat:appcompat:$androidxAppCompatVersion"
    implementation "androidx.coordinatorlayout:coordinatorlayout:$androidxCoordinatorLayoutVersion"
    implementation "androidx.core:core-splashscreen:$coreSplashScreenVersion"
    implementation project(':capacitor-android')
    testImplementation "junit:junit:$junitVersion"
    androidTestImplementation "androidx.test.ext:junit:$androidxJunitVersion"
    androidTestImplementation "androidx.test.espresso:espresso-core:$androidxEspressoCoreVersion"
    implementation project(':capacitor-cordova-android-plugins')
    // Item #081 (release v0.1.7.1) — WorkManager pra DoseSyncWorker
    // periodic background sync (defense-in-depth notif idle ilimitado).
    implementation "androidx.work:work-runtime:2.9.1"
    // Guava (Android-friendly) — work-runtime requer ListenableFuture classfile.
    // Stub 1.0/9999.0 não estava sendo resolvido no compileClasspath; Guava
    // completo garante. ~500KB AAR aceitável vs healthcare reliability.
    implementation "com.google.guava:guava:33.4.0-android"
    // Item #083 (release v0.1.7.2) — DosyMessagingService extends FirebaseMessagingService
    // pra interceptar FCM data messages e agendar alarme nativo via AlarmScheduler.
    // @capacitor/push-notifications declara firebase-messaging como 'implementation'
    // (encapsulado, não vaza pro módulo :app). Adicionamos diretamente na mesma
    // versão (25.0.1) pra app/src/main/java/.../DosyMessagingService.java compilar.
    implementation "com.google.firebase:firebase-messaging:25.0.1"
}

apply from: 'capacitor.build.gradle'

try {
    def servicesJSON = file('google-services.json')
    if (servicesJSON.text) {
        apply plugin: 'com.google.gms.google-services'
    }
} catch(Exception e) {
    logger.info("google-services.json not found, google-services plugin not applied. Push Notifications won't work")
}
